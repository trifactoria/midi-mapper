<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MIDI Mapper</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #101317;
        color: #e8edf2;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 48px));
        border: 1px solid #303840;
        border-radius: 8px;
        padding: 24px;
        background: #171b20;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        font-weight: 650;
      }

      p {
        margin: 0 0 14px;
        color: #aeb8c2;
        line-height: 1.5;
      }

      code {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MIDI Mapper Desktop Shell</h1>
      <p>
        This first Linux package contains the Tauri shell. Start the local
        backend and frontend, then open <code>http://localhost:3000/v2</code>.
      </p>
      <p>Use <code>bash scripts/dev-desktop.sh</code> for the working desktop dev path.</p>
    </main>
  </body>
</html>
